<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ana Rêve Initiative — A European initiative for hope and dignity</title>
    <meta
      name="description"
      content="Ana Rêve Initiative is a European nonprofit bringing together people, expertise and technology to support families and vulnerable lives with dignity."
    />
    <meta property="og:title" content="Ana Rêve Initiative" />
    <meta
      property="og:description"
      content="A European initiative for hope, dignity and meaningful support."
    />
    <meta property="og:type" content="website" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap"
    />
  </head>
  <body>
    <!-- Netlify Forms detection (static form parsed at build time) -->
    <form name="notify" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="notify" />
      <input type="text" name="bot-field" />
      <input type="email" name="email" />
      <input type="text" name="firstName" />
      <input type="checkbox" name="consent" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
